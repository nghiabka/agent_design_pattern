# ═══════════════════════════════════════════════════════════════
# Docker Compose — Memory Management Chatbot
# ═══════════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-chatbot
    env_file:
      - .env
    volumes:
      - .:/app
      - sqlite-data:/data/db
    network_mode: host
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    stdin_open: true
    tty: true

volumes:
  sqlite-data:
    driver: local
